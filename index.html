function toBE(d) { if (!d) return ""; var x = new Date(d); var m = ["มกราคม","กุมภาพันธ์","มีนาคม","เมษายน","พฤษภาคม","มิถุนายน","กรกฎาคม","สิงหาคม","กันยายน","ตุลาคม","พฤศจิกายน","ธันวาคม"]; return x.getDate() + " " + m[x.getMonth()] + " " + (x.getFullYear() + 543); }
function toBS(d) { if (!d) return ""; var x = new Date(d); var m = ["ม.ค.","ก.พ.","มี.ค.","เม.ย.","พ.ค.","มิ.ย.","ก.ค.","ส.ค.","ก.ย.","ต.ค.","พ.ย.","ธ.ค."]; return x.getDate() + " " + m[x.getMonth()] + " " + (x.getFullYear() + 543); }

          <div><span className="text-xs text-gray-400">ผู้ต้องหา</span><div className="text-sm font-medium">{c.sus}</div></div>
          <div><span className="text-xs text-gray-400">สถานะ</span><div><span className={"px-2 py-0.5 rounded-full text-xs font-semibold "+scl(c.st)}>{c.st}</span></div></div>
          <div><span className="text-xs text-gray-400">พงส.</span><div className="text-sm font-medium">{c.ir} {c.inv}</div></div>
        </div>
      </div>
      <div className="bg-white rounded-2xl shadow-xl p-6">
        <h3 className="text-lg font-bold text-gray-800 mb-6 flex items-center gap-2"><Clock size={20} style={{ color: CLR.pri }}/> ไทม์ไลน์ความคืบหน้า</h3>
        {cn.map(function(n,i) { return (
          <div key={n.id} className="relative pl-8 pb-6">
            {i<cn.length-1 && <div className="absolute left-3 top-6 w-0.5 h-full bg-gray-200"/>}
            <div className="absolute left-0 top-1 w-7 h-7 rounded-full flex items-center justify-center shadow-md" style={{ background: i===cn.length-1 ? "linear-gradient(135deg,"+CLR.gold+","+CLR.goldLt+")" : CLR.pri }}><CheckCircle size={14} className="text-white"/></div>
            <div className="bg-gray-50 rounded-xl p-4 border border-gray-100">
              <div className="flex items-center gap-2 mb-2 flex-wrap"><span className="text-sm font-semibold" style={{ color: CLR.pri }}>{toBS(n.dt)}</span><span className="text-xs px-2 py-0.5 rounded-full text-white" style={{ background: CLR.pri }}>{n.tp}</span><span className="text-xs text-gray-500">{mic(n.mt)} {n.mt}</span></div>
              <p className="text-sm text-gray-700"><span className="text-gray-400 text-xs">ผลดำเนินการ: </span>{n.rs}</p>
              <p className="text-sm text-gray-600"><span className="text-gray-400 text-xs">ดำเนินการต่อ: </span>{n.nx}</p>
            </div>
          </div>); })}
      </div>
      <div className="bg-white rounded-2xl shadow-lg p-6 mt-6"><h3 className="font-semibold text-gray-700 mb-4">ติดต่อสอบถาม</h3><div className="grid grid-cols-2 gap-4">
        <div className="p-4 rounded-xl border" style={{ background: "rgba(123,24,24,0.04)", borderColor: "rgba(123,24,24,0.15)" }}><p className="text-xs mb-1" style={{ color: CLR.priLt }}>พนักงานสอบสวนเจ้าของสำนวน</p><p className="font-semibold" style={{ color: CLR.pri }}>{c.ir} {c.inv}</p><p className="text-sm" style={{ color: CLR.priLt }}>{c.ipo}</p><p className="text-sm mt-1" style={{ color: CLR.priLt }}><Phone size={12} className="inline mr-1"/>{c.ip}</p></div>
        <div className="p-4 rounded-xl" style={{ background: "rgba(196,154,42,0.08)", border: "1px solid rgba(196,154,42,0.2)" }}><p className="text-xs mb-1" style={{ color: "#a67c1a" }}>ผู้บังคับบัญชา</p><p className="font-semibold" style={{ color: "#8b6914" }}>{ST.cmdr}</p><p className="text-sm" style={{ color: "#a67c1a" }}>{ST.cmdPos}</p><p className="text-sm mt-1" style={{ color: "#a67c1a" }}><Phone size={12} className="inline mr-1"/>{ST.cmdPh}</p></div>
      </div></div>
    </div></div>
  );
}

function LoginPage(props) {
  function doLogin() { if (props.u === "admin" && props.p === "0963542024") { props.onOk(); } else { props.setErr("ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง"); } }
  return (
    <div className="min-h-screen flex items-center justify-center px-4" style={{ background: CLR.bg }}>
    <div className="bg-white rounded-2xl shadow-2xl p-8 w-full max-w-sm">
      <div className="text-center mb-6">
        <img src={LOGO_B64} alt="Logo" className="w-20 h-20 mx-auto rounded-full shadow-lg border-2 mb-3" style={{ borderColor: CLR.gold }} />
        <h2 className="text-xl font-bold" style={{ color: CLR.pri }}>เข้าสู่ระบบเจ้าหน้าที่</h2>
        <p className="text-xs text-gray-400 mt-1">{ST.name}</p>
      </div>
      {props.err && <div className="mb-4 p-3 rounded-lg bg-red-50 text-red-600 text-sm text-center">{props.err}</div>}
      <div className="space-y-4">
        <div><label className="text-sm text-gray-600 mb-1 block">ชื่อผู้ใช้</label><input type="text" value={props.u} onChange={function(e){props.setU(e.target.value);props.setErr("");}} className="w-full px-3 py-2 rounded-xl border border-gray-200 outline-none text-sm"/></div>
        <div><label className="text-sm text-gray-600 mb-1 block">รหัสผ่าน</label><input type="password" value={props.p} onChange={function(e){props.setP(e.target.value);props.setErr("");}} onKeyDown={function(e){if(e.key==="Enter")doLogin();}} className="w-full px-3 py-2 rounded-xl border border-gray-200 outline-none text-sm"/></div>
        <button onClick={doLogin} className="w-full py-3 rounded-xl text-white font-semibold" style={{ background: CLR.btn }}>เข้าสู่ระบบ</button>
        <button onClick={props.onCancel} className="w-full py-2 text-sm text-gray-500">← กลับหน้าประชาชน</button>
      </div>
    </div></div>
  );
}

function AdminPanel(props) {
  var cases=props.cases; var notifs=props.notifs; var setNotifs=props.setNotifs; var tab=props.tab; var setTab=props.setTab;
  function saveNotif() { if(!props.nfCid||!props.nfRs){alert("กรุณาเลือกคดีและกรอกผลดำเนินการ");return;} setNotifs(notifs.concat([{id:"n"+Date.now(),cid:props.nfCid,tp:props.nfTp,dt:props.nfDt,mt:props.nfMt,rs:props.nfRs,nx:props.nfNx,rf:""}])); props.setShowNf(false);props.setNfCid("");props.setNfRs("");props.setNfNx(""); }
  var tabs=[{id:"dash",l:"📊 สรุปข้อมูล"},{id:"cases",l:"📋 รายการคดี"},{id:"notifs",l:"🔔 บันทึกความคืบหน้า"}];
  return (
    <div className="min-h-screen" style={{ background: "#faf5ef" }}><div className="max-w-6xl mx-auto px-4 py-6">
      <div className="flex gap-1 mb-6 bg-white rounded-xl p-1 shadow-md overflow-x-auto">{tabs.map(function(t){return(<button key={t.id} onClick={function(){setTab(t.id);}} className={"flex-1 py-3 rounded-lg text-sm font-medium whitespace-nowrap px-3 "+(tab===t.id?"text-white shadow-md":"text-gray-500 hover:bg-gray-50")} style={tab===t.id?{background:CLR.btn}:{}}>{t.l}</button>);})}</div>
      {tab==="dash" && <Dashboard cases={cases} notifs={notifs} exp={props.dashExp} setExp={props.setDashExp}/>}
      {tab==="cases" && (<div className="bg-white rounded-2xl shadow-lg overflow-x-auto"><table className="w-full text-sm"><thead><tr style={{background:CLR.priDk}} className="text-white text-left"><th className="px-3 py-3">เลขคดี</th><th className="px-3 py-3">ฐานความผิด</th><th className="px-3 py-3">ผู้เสียหาย</th><th className="px-3 py-3">พงส.</th><th className="px-3 py-3">สถานะ</th><th className="px-3 py-3 text-center">แจ้งแล้ว</th><th className="px-3 py-3 text-center">แจ้ง</th></tr></thead><tbody>{cases.map(function(c,i){var nc=notifs.filter(function(n){return n.cid===c.id;}).length;return(<tr key={c.id} className={"border-b border-gray-100 "+(i%2?"bg-gray-50/30":"")}><td className="px-3 py-3 font-semibold" style={{color:CLR.pri}}>{c.cn}</td><td className="px-3 py-3 text-gray-700 max-w-[150px] truncate">{c.off}</td><td className="px-3 py-3 whitespace-nowrap">{c.vt} {c.vn}</td><td className="px-3 py-3 text-xs whitespace-nowrap">{c.ir} {c.inv}</td><td className="px-3 py-3"><span className={"px-2 py-0.5 rounded-full text-xs font-medium "+scl(c.st)}>{c.st}</span></td><td className="px-3 py-3 text-center"><span className={"px-2 py-0.5 rounded-full text-xs font-medium "+(nc>0?"bg-emerald-100 text-emerald-700":"bg-red-100 text-red-700")}>{nc>0?nc+" ครั้ง":"ยังไม่แจ้ง"}</span></td><td className="px-3 py-3 text-center"><button onClick={function(){props.setNfCid(c.id);props.setShowNf(true);setTab("notifs");}} className="p-1.5 rounded-lg hover:bg-red-50" style={{color:CLR.pri}}><Bell size={14}/></button></td></tr>);})}</tbody></table></div>)}
      {tab==="notifs" && (<div>
        <div className="flex items-center justify-between mb-4"><h3 className="text-lg font-bold" style={{color:CLR.pri}}>รายการแจ้งความคืบหน้า ({notifs.length})</h3><button onClick={function(){props.setShowNf(true);}} className="flex items-center gap-2 px-4 py-2 rounded-xl text-white text-sm font-medium" style={{background:CLR.btn}}><Plus size={16}/>เพิ่มการแจ้ง</button></div>
        {props.showNf && (<div className="bg-white rounded-2xl shadow-lg p-6 mb-6 border-l-4" style={{borderLeftColor:CLR.gold}}><h4 className="font-semibold mb-4" style={{color:CLR.pri}}>บันทึกการแจ้งความคืบหน้า</h4><div className="space-y-4">
          <div><label className="text-sm text-gray-600 mb-1 block">เลือกคดี *</label><select value={props.nfCid} onChange={function(e){props.setNfCid(e.target.value);}} className="w-full px-3 py-2 rounded-xl border border-gray-200 text-sm bg-white"><option value="">-- เลือกคดี --</option>{cases.map(function(c){return <option key={c.id} value={c.id}>{c.cn} — {c.off} ({c.vt} {c.vn})</option>;})}</select></div>
          <div className="grid grid-cols-3 gap-4">
            <div><label className="text-sm text-gray-600 mb-1 block">ประเภท</label><select value={props.nfTp} onChange={function(e){props.setNfTp(e.target.value);}} className="w-full px-3 py-2 rounded-xl border border-gray-200 text-sm bg-white"><option value="30 วัน">30 วัน</option><option value="60 วัน">60 วัน</option><option value="สรุปสำนวน">สรุปสำนวน</option></select></div>
            <div><label className="text-sm text-gray-600 mb-1 block">วันที่แจ้ง</label><input type="date" value={props.nfDt} onChange={function(e){props.setNfDt(e.target.value);}} className="w-full px-3 py-2 rounded-xl border border-gray-200 text-sm"/></div>
            <div><label className="text-sm text-gray-600 mb-1 block">ช่องทาง</label><select value={props.nfMt} onChange={function(e){props.setNfMt(e.target.value);}} className="w-full px-3 py-2 rounded-xl border border-gray-200 text-sm bg-white"><option value="เว็บไซต์">เว็บไซต์</option><option value="หนังสือ">หนังสือ</option><option value="ไปรษณีย์">ไปรษณีย์</option><option value="PSC">PSC</option><option value="อิเล็กทรอนิกส์">อิเล็กทรอนิกส์</option></select></div>
          </div>
          <div><label className="text-sm text-gray-600 mb-1 block">ผลดำเนินการ *</label><textarea value={props.nfRs} onChange={function(e){props.setNfRs(e.target.value);}} className="w-full px-3 py-2 rounded-xl border border-gray-200 text-sm resize-none" rows={3} placeholder="เช่น สอบสวนเสร็จ สั่งฟ้อง..."/></div>
          <div><label className="text-sm text-gray-600 mb-1 block">ดำเนินการต่อ</label><input type="text" value={props.nfNx} onChange={function(e){props.setNfNx(e.target.value);}} className="w-full px-3 py-2 rounded-xl border border-gray-200 text-sm" placeholder="เช่น ติดตามผลคดี"/></div>
          <div className="flex justify-end gap-3"><button onClick={function(){props.setShowNf(false);}} className="px-4 py-2 rounded-xl border border-gray-200 text-gray-600 text-sm">ยกเลิก</button><button onClick={saveNotif} className="px-5 py-2 rounded-xl text-white text-sm font-medium" style={{background:CLR.btn}}><Save size={14} className="inline mr-1"/>บันทึก</button></div>
        </div></div>)}
        <div className="bg-white rounded-2xl shadow-lg overflow-x-auto"><table className="w-full text-sm"><thead><tr style={{background:CLR.priDk}} className="text-white text-left"><th className="px-3 py-3">คดี</th><th className="px-3 py-3">ผู้เสียหาย</th><th className="px-3 py-3">ประเภท</th><th className="px-3 py-3">วันที่แจ้ง</th><th className="px-3 py-3">ช่องทาง</th><th className="px-3 py-3">ผลดำเนินการ</th></tr></thead><tbody>{notifs.slice().sort(function(a,b){return new Date(b.dt)-new Date(a.dt);}).map(function(n,i){var c=cases.find(function(x){return x.id===n.cid;});if(!c)return null;return(<tr key={n.id} className={"border-b border-gray-100 "+(i%2?"bg-gray-50/30":"")}><td className="px-3 py-3 font-semibold" style={{color:CLR.pri}}>{c.cn}</td><td className="px-3 py-3 whitespace-nowrap">{c.vt} {c.vn}</td><td className="px-3 py-3"><span className="px-2 py-0.5 rounded-full text-xs text-white" style={{background:CLR.pri}}>{n.tp}</span></td><td className="px-3 py-3 whitespace-nowrap">{toBS(n.dt)}</td><td className="px-3 py-3">{mic(n.mt)} {n.mt}</td><td className="px-3 py-3 text-gray-700 max-w-[200px] truncate">{n.rs}</td></tr>);})}</tbody></table></div>
      </div>)}
    </div></div>
  );
}

function Footer() {
  return (<footer className="text-center py-4 text-xs text-gray-400" style={{ background: "#f5efe5" }}>
    <p>{ST.name} | {ST.full}</p>
    <p>ระบบแจ้งความคืบหน้าการสอบสวนคดีอาญา | ตามคำสั่ง ตร. ที่ 419/2556</p>
  </footer>);
}

function App() {
  var cs = useState(initCases); var cases = cs[0]; var setCases = cs[1];
  var ns = useState(initNotifs); var notifs = ns[0]; var setNotifs = ns[1];
  var as = useState(false); var isAdm = as[0]; var setIsAdm = as[1];
  var ls = useState(false); var showLog = ls[0]; var setShowLog = ls[1];
  var ps = useState("search"); var page = ps[0]; var setPage = ps[1];
  var ss = useState(null); var selCase = ss[0]; var setSelCase = ss[1];
  var qs = useState(""); var q = qs[0]; var setQ = qs[1];
  var rs = useState(null); var res = rs[0]; var setRes = rs[1];
  var ds = useState(false); var done = ds[0]; var setDone = ds[1];
  var us = useState(""); var u = us[0]; var setU = us[1];
  var pp = useState(""); var p = pp[0]; var setP = pp[1];
  var es = useState(""); var err = es[0]; var setErr = es[1];
  var ts = useState("dash"); var tab = ts[0]; var setTab = ts[1];
  var nc = useState(""); var nfCid = nc[0]; var setNfCid = nc[1];
  var nt = useState("30 วัน"); var nfTp = nt[0]; var setNfTp = nt[1];
  var nd = useState(new Date().toISOString().split("T")[0]); var nfDt = nd[0]; var setNfDt = nd[1];
  var nm = useState("เว็บไซต์"); var nfMt = nm[0]; var setNfMt = nm[1];
  var nr = useState(""); var nfRs = nr[0]; var setNfRs = nr[1];
  var nn = useState(""); var nfNx = nn[0]; var setNfNx = nn[1];
  var sf = useState(false); var showNf = sf[0]; var setShowNf = sf[1];
  var de = useState(null); var dashExp = de[0]; var setDashExp = de[1];

  if (showLog && !isAdm) { return (<div style={{fontFamily:"Sarabun,Noto Sans Thai,sans-serif"}}><link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet"/><LoginPage onOk={function(){setIsAdm(true);setShowLog(false);}} onCancel={function(){setShowLog(false);}} u={u} setU={setU} p={p} setP={setP} err={err} setErr={setErr}/></div>); }

  var content = null;
  if (isAdm) { content = <AdminPanel cases={cases} setCases={setCases} notifs={notifs} setNotifs={setNotifs} tab={tab} setTab={setTab} nfCid={nfCid} setNfCid={setNfCid} nfTp={nfTp} setNfTp={setNfTp} nfDt={nfDt} setNfDt={setNfDt} nfMt={nfMt} setNfMt={setNfMt} nfRs={nfRs} setNfRs={setNfRs} nfNx={nfNx} setNfNx={setNfNx} showNf={showNf} setShowNf={setShowNf} dashExp={dashExp} setDashExp={setDashExp}/>; }
  else if (page === "dashboard") { content = <Dashboard cases={cases} notifs={notifs} exp={dashExp} setExp={setDashExp}/>; }
  else if (page === "detail" && selCase) { content = <Detail c={selCase} notifs={notifs} onBack={function(){setPage("search");}}/>; }
  else { content = <PubSearch cases={cases} notifs={notifs} onSelect={function(c){setSelCase(c);setPage("detail");}} q={q} setQ={setQ} res={res} setRes={setRes} done={done} setDone={setDone}/>; }

  return (<div style={{fontFamily:"Sarabun,Noto Sans Thai,sans-serif"}}><link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap" rel="stylesheet"/><Header isAdmin={isAdm} page={page} setPage={setPage} onToggleAdmin={function(){setShowLog(true);}} onLogout={function(){setIsAdm(false);}}/>{content}<Footer/></div>);
}


ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
